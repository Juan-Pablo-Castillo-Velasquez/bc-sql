<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" width="820" height="500">
  <rect width="820" height="500" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="410" y="36" font-family="Inter, Roboto, sans-serif" font-size="18" font-weight="700"
        fill="#e2e8f0" text-anchor="middle">Constraints — Integridad de Datos</text>

  <!-- Tabla departments -->
  <rect x="30" y="60" width="220" height="200" rx="6" fill="#16213e" stroke="#336791" stroke-width="2"/>
  <rect x="30" y="60" width="220" height="34" rx="6" fill="#336791"/>
  <text x="140" y="82" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700"
        fill="#e2e8f0" text-anchor="middle">departments</text>

  <!-- Header row -->
  <line x1="30" y1="94" x2="250" y2="94" stroke="#336791" stroke-width="1"/>
  <rect x="30" y="94" width="220" height="26" fill="#1a1a2e"/>
  <text x="50" y="111" font-family="'Courier New', monospace" font-size="11" fill="#f6c90e">id</text>
  <text x="150" y="111" font-family="'Courier New', monospace" font-size="10" fill="#c678dd">PK  INTEGER</text>

  <rect x="30" y="120" width="220" height="26" fill="#16213e"/>
  <text x="50" y="137" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">name</text>
  <text x="150" y="137" font-family="'Courier New', monospace" font-size="10" fill="#56b6c2">NOT NULL UNIQUE</text>

  <rect x="30" y="146" width="220" height="26" fill="#1a1a2e"/>
  <text x="50" y="163" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">location</text>
  <text x="150" y="163" font-family="'Courier New', monospace" font-size="10" fill="#56b6c2">NOT NULL</text>

  <!-- Leyenda PK -->
  <rect x="50" y="200" width="160" height="46" rx="4" fill="#1a1a2e"/>
  <text x="130" y="216" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#718096" text-anchor="middle">PK = PRIMARY KEY</text>
  <text x="130" y="230" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#718096" text-anchor="middle">implica NOT NULL + UNIQUE</text>

  <!-- FK arrow -->
  <line x1="250" y1="350" x2="295" y2="350" stroke="#c678dd" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="295,344 307,350 295,356" fill="#c678dd"/>
  <text x="272" y="340" font-family="Inter, Roboto, sans-serif" font-size="9" fill="#c678dd" text-anchor="middle">FK</text>

  <!-- Tabla employees -->
  <rect x="310" y="60" width="480" height="330" rx="6" fill="#16213e" stroke="#336791" stroke-width="2"/>
  <rect x="310" y="60" width="480" height="34" rx="6" fill="#336791"/>
  <text x="550" y="82" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700"
        fill="#e2e8f0" text-anchor="middle">employees</text>

  <line x1="310" y1="94" x2="790" y2="94" stroke="#336791" stroke-width="1"/>

  <!-- Columnas employees -->
  <!-- id -->
  <rect x="310" y="94" width="480" height="28" fill="#1a1a2e"/>
  <text x="330" y="113" font-family="'Courier New', monospace" font-size="11" fill="#f6c90e">id</text>
  <text x="430" y="113" font-family="'Courier New', monospace" font-size="10" fill="#c678dd">PK  INTEGER</text>

  <!-- first_name -->
  <rect x="310" y="122" width="480" height="28" fill="#16213e"/>
  <text x="330" y="141" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">first_name</text>
  <text x="430" y="141" font-family="'Courier New', monospace" font-size="10" fill="#56b6c2">TEXT  NOT NULL</text>

  <!-- email -->
  <rect x="310" y="150" width="480" height="28" fill="#1a1a2e"/>
  <text x="330" y="169" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">email</text>
  <text x="430" y="169" font-family="'Courier New', monospace" font-size="10" fill="#98c379">TEXT  UNIQUE  (acepta NULL)</text>

  <!-- salary -->
  <rect x="310" y="178" width="480" height="28" fill="#16213e"/>
  <text x="330" y="197" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">salary</text>
  <text x="430" y="197" font-family="'Courier New', monospace" font-size="10" fill="#e06c75">REAL  NOT NULL  CHECK (salary &gt; 0)</text>

  <!-- level -->
  <rect x="310" y="206" width="480" height="28" fill="#1a1a2e"/>
  <text x="330" y="225" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">level</text>
  <text x="430" y="225" font-family="'Courier New', monospace" font-size="10" fill="#e06c75">TEXT  CHECK (IN 'junior','mid','senior')</text>

  <!-- is_active -->
  <rect x="310" y="234" width="480" height="28" fill="#16213e"/>
  <text x="330" y="253" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">is_active</text>
  <text x="430" y="253" font-family="'Courier New', monospace" font-size="10" fill="#56b6c2">INTEGER  NOT NULL  DEFAULT 1</text>

  <!-- department_id -->
  <rect x="310" y="262" width="480" height="28" fill="#1a1a2e"/>
  <text x="330" y="281" font-family="'Courier New', monospace" font-size="11" fill="#c678dd">department_id</text>
  <text x="430" y="281" font-family="'Courier New', monospace" font-size="10" fill="#c678dd">INTEGER  NOT NULL  FK → departments</text>

  <!-- FK Line from department_id to departments.id -->
  <line x1="310" y1="276" x2="250" y2="160" stroke="#c678dd" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Leyenda ON DELETE RESTRICT -->
  <rect x="330" y="302" width="440" height="70" rx="4" fill="#1a1a2e"/>
  <text x="340" y="320" font-family="'Courier New', monospace" font-size="10" fill="#c678dd">REFERENCES departments(id) ON DELETE RESTRICT</text>
  <text x="340" y="338" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#718096">→ impide borrar un departamento con empleados</text>
  <text x="340" y="354" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#f6c90e">⚠  SQLite: PRAGMA foreign_keys = ON;</text>

  <!-- Leyenda inferior -->
  <rect x="30" y="410" width="760" height="56" rx="6" fill="#16213e" stroke="#336791" stroke-width="1"/>
  <text x="50" y="430" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#e2e8f0">Leyenda de constraints</text>
  <text x="50" y="450" font-family="'Courier New', monospace" font-size="10" fill="#c678dd">PK</text>
  <text x="76" y="450" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#718096">PRIMARY KEY  |  </text>
  <text x="190" y="450" font-family="'Courier New', monospace" font-size="10" fill="#56b6c2">NOT NULL</text>
  <text x="238" y="450" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#718096">obligatorio  |  </text>
  <text x="330" y="450" font-family="'Courier New', monospace" font-size="10" fill="#98c379">UNIQUE</text>
  <text x="374" y="450" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#718096">sin duplicados  |  </text>
  <text x="480" y="450" font-family="'Courier New', monospace" font-size="10" fill="#e06c75">CHECK</text>
  <text x="519" y="450" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#718096">validación  |  </text>
  <text x="605" y="450" font-family="'Courier New', monospace" font-size="10" fill="#c678dd">FK</text>
  <text x="620" y="450" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#718096">integridad referencial</text>

  <text x="410" y="488" font-family="Inter, Roboto, sans-serif" font-size="10"
        fill="#718096" text-anchor="middle">Bootcamp SQL — Semana 07: NULL y Constraints</text>
</svg>
