<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400" font-family="Inter, Roboto, sans-serif">
  <!-- Fondo -->
  <rect width="760" height="400" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#e2e8f0">GIN sobre JSONB — Operador @&gt;</text>

  <!-- Tabla products -->
  <rect x="30" y="55" width="200" height="190" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="130" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#336791">products</text>
  <!-- header -->
  <rect x="30" y="78" width="200" height="22" rx="0" fill="#0d1b2a"/>
  <text x="55" y="93" font-size="10" fill="#718096">id</text>
  <text x="85" y="93" font-size="10" fill="#718096">name</text>
  <text x="155" y="93" font-size="10" fill="#718096">attributes (JSONB)</text>
  <!-- rows -->
  <text x="47" y="115" font-size="10" fill="#c678dd">1</text>
  <text x="65" y="115" font-size="10" fill="#e2e8f0">Laptop</text>
  <text x="135" y="115" font-size="9" fill="#98c379">{"color":"silver",...}</text>
  <text x="47" y="135" font-size="10" fill="#c678dd">2</text>
  <text x="65" y="135" font-size="10" fill="#e2e8f0">Tablet</text>
  <text x="135" y="135" font-size="9" fill="#98c379">{"color":"black",...}</text>
  <text x="47" y="155" font-size="10" fill="#c678dd">3</text>
  <text x="65" y="155" font-size="10" fill="#e2e8f0">Monitor</text>
  <text x="135" y="155" font-size="9" fill="#98c379">{"hdr":true,...}</text>
  <text x="47" y="175" font-size="10" fill="#c678dd">4</text>
  <text x="65" y="175" font-size="10" fill="#e2e8f0">Camera</text>
  <text x="135" y="175" font-size="9" fill="#98c379">{"color":"silver",...}</text>
  <text x="47" y="195" font-size="10" fill="#c678dd">5</text>
  <text x="65" y="195" font-size="10" fill="#e2e8f0">Hub</text>
  <text x="135" y="195" font-size="9" fill="#98c379">{"ports":[...],...}</text>
  <text x="47" y="220" font-size="10" fill="#718096">⋮</text>
  <line x1="30" y1="227" x2="230" y2="227" stroke="#336791" stroke-width="1"/>
  <text x="130" y="240" text-anchor="middle" font-size="9" fill="#718096">CREATE INDEX idx_attrs</text>
  <text x="130" y="253" text-anchor="middle" font-size="9" fill="#336791">USING GIN (attributes)</text>

  <!-- flecha build index -->
  <line x1="230" y1="150" x2="290" y2="150" stroke="#336791" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="255" y="144" font-size="9" fill="#718096">GIN build</text>

  <!-- Índice GIN -->
  <rect x="290" y="55" width="250" height="220" rx="6" fill="#16213e" stroke="#56b6c2" stroke-width="1.5"/>
  <text x="415" y="74" text-anchor="middle" font-size="12" font-weight="bold" fill="#56b6c2">Índice GIN (invertido)</text>
  <!-- rows -->
  <!-- color.silver -->
  <rect x="302" y="82" width="110" height="22" rx="4" fill="#0d1b2a"/>
  <text x="357" y="97" text-anchor="middle" font-size="10" fill="#f6c90e">color.silver</text>
  <line x1="414" y1="93" x2="445" y2="93" stroke="#e2e8f0" stroke-width="1" marker-end="url(#a2)"/>
  <text x="490" y="97" text-anchor="middle" font-size="10" fill="#c678dd">{1, 4}</text>

  <!-- color.black -->
  <rect x="302" y="112" width="110" height="22" rx="4" fill="#0d1b2a"/>
  <text x="357" y="127" text-anchor="middle" font-size="10" fill="#f6c90e">color.black</text>
  <line x1="414" y1="123" x2="445" y2="123" stroke="#e2e8f0" stroke-width="1" marker-end="url(#a2)"/>
  <text x="460" y="127" text-anchor="middle" font-size="10" fill="#c678dd">{2}</text>

  <!-- hdr.true -->
  <rect x="302" y="142" width="110" height="22" rx="4" fill="#0d1b2a"/>
  <text x="357" y="157" text-anchor="middle" font-size="10" fill="#f6c90e">hdr.true</text>
  <line x1="414" y1="153" x2="445" y2="153" stroke="#e2e8f0" stroke-width="1" marker-end="url(#a2)"/>
  <text x="460" y="157" text-anchor="middle" font-size="10" fill="#c678dd">{3}</text>

  <!-- ram_gb.16 -->
  <rect x="302" y="172" width="110" height="22" rx="4" fill="#0d1b2a"/>
  <text x="357" y="187" text-anchor="middle" font-size="10" fill="#f6c90e">ram_gb.16</text>
  <line x1="414" y1="183" x2="445" y2="183" stroke="#e2e8f0" stroke-width="1" marker-end="url(#a2)"/>
  <text x="460" y="187" text-anchor="middle" font-size="10" fill="#c678dd">{1}</text>

  <!-- ports -->
  <rect x="302" y="202" width="110" height="22" rx="4" fill="#0d1b2a"/>
  <text x="357" y="217" text-anchor="middle" font-size="10" fill="#f6c90e">ports.USB-A</text>
  <line x1="414" y1="213" x2="445" y2="213" stroke="#e2e8f0" stroke-width="1" marker-end="url(#a2)"/>
  <text x="460" y="217" text-anchor="middle" font-size="10" fill="#c678dd">{5}</text>

  <text x="357" y="248" text-anchor="middle" font-size="9" fill="#718096">⋮</text>

  <!-- Query -->
  <rect x="30" y="290" width="460" height="50" rx="6" fill="#0d1b2a" stroke="#98c379" stroke-width="1.5"/>
  <text x="260" y="311" text-anchor="middle" font-size="11" fill="#718096">WHERE attributes</text>
  <text x="260" y="330" text-anchor="middle" font-size="11" fill="#98c379">@&gt; '{"color": "silver"}'</text>

  <!-- flecha query → GIN -->
  <line x1="490" y1="315" x2="540" y2="150" stroke="#98c379" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="530" y="240" font-size="9" fill="#98c379">lookup</text>
  <text x="530" y="253" font-size="9" fill="#98c379">color.silver</text>

  <!-- Resultado -->
  <rect x="555" y="270" width="170" height="75" rx="6" fill="#16213e" stroke="#98c379" stroke-width="1.5"/>
  <text x="640" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#98c379">Resultado</text>
  <text x="640" y="310" text-anchor="middle" font-size="10" fill="#e2e8f0">id=1  Laptop Pro</text>
  <text x="640" y="328" text-anchor="middle" font-size="10" fill="#e2e8f0">id=4  Camera X200</text>
  <text x="640" y="345" text-anchor="middle" font-size="8" fill="#718096">(sin seq scan)</text>

  <!-- flecha GIN → resultado -->
  <line x1="540" y1="93" x2="580" y2="270" stroke="#98c379" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- leyenda -->
  <rect x="30" y="355" width="700" height="32" rx="6" fill="#16213e" stroke="#336791" stroke-width="1"/>
  <text x="380" y="376" text-anchor="middle" font-size="10" fill="#718096">El índice GIN mapea cada entrada del documento a las filas que la contienen — la búsqueda evita leer la tabla completa</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#336791"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e2e8f0"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#98c379"/>
    </marker>
  </defs>
</svg>
