<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <rect width="820" height="420" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="410" y="36" font-family="Inter, Roboto, sans-serif" font-size="18" font-weight="700"
        fill="#e2e8f0" text-anchor="middle">COALESCE — Primer Valor No NULL</text>

  <!-- Código fuente -->
  <rect x="30" y="56" width="760" height="42" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="410" y="73" font-family="'Courier New', monospace" font-size="13"
        fill="#c678dd" text-anchor="middle">COALESCE(</text>
  <text x="410" y="73" font-family="'Courier New', monospace" font-size="13"
        fill="#e2e8f0" text-anchor="middle">          phone_work,  phone_mobile,  'Sin teléfono'  )</text>

  <!-- Reescribir fila correctamente -->
  <rect x="30" y="56" width="760" height="42" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="410" y="82" font-family="'Courier New', monospace" font-size="13" text-anchor="middle">
    <tspan fill="#c678dd">COALESCE(</tspan><tspan fill="#f6c90e">phone_work</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#f6c90e">phone_mobile</tspan><tspan fill="#e2e8f0">, </tspan><tspan fill="#98c379">'Sin teléfono'</tspan><tspan fill="#c678dd">)</tspan>
  </text>

  <!-- Flechas y diamantes -->
  <!-- Arg 1 -->
  <rect x="60" y="130" width="140" height="50" rx="8" fill="#16213e" stroke="#f6c90e" stroke-width="1.5"/>
  <text x="130" y="151" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#718096" text-anchor="middle">arg 1</text>
  <text x="130" y="168" font-family="'Courier New', monospace" font-size="12" fill="#f6c90e" text-anchor="middle">phone_work</text>

  <!-- Flecha derecha -->
  <line x1="200" y1="155" x2="245" y2="155" stroke="#56b6c2" stroke-width="2"/>
  <polygon points="245,149 257,155 245,161" fill="#56b6c2"/>

  <!-- Diamante 1 -->
  <polygon points="290,130 340,155 290,180 240,155" fill="#16213e" stroke="#56b6c2" stroke-width="1.5"/>
  <text x="290" y="152" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56b6c2" text-anchor="middle">¿es</text>
  <text x="290" y="165" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56b6c2" text-anchor="middle">NULL?</text>

  <!-- No → devuelve -->
  <line x1="340" y1="155" x2="385" y2="155" stroke="#98c379" stroke-width="2"/>
  <polygon points="385,149 397,155 385,161" fill="#98c379"/>
  <text x="360" y="148" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#98c379" text-anchor="middle">NO</text>

  <!-- Resultado izquierda -->
  <rect x="397" y="130" width="120" height="50" rx="8" fill="#1a1a2e" stroke="#98c379" stroke-width="2"/>
  <text x="457" y="151" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#98c379" text-anchor="middle">RETORNA</text>
  <text x="457" y="168" font-family="'Courier New', monospace" font-size="11" fill="#f6c90e" text-anchor="middle">phone_work</text>

  <!-- Sí ↓ -->
  <line x1="290" y1="180" x2="290" y2="210" stroke="#e06c75" stroke-width="2"/>
  <polygon points="284,210 290,222 296,210" fill="#e06c75"/>
  <text x="300" y="200" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e06c75">SÍ</text>

  <!-- Arg 2 -->
  <rect x="200" y="222" width="180" height="50" rx="8" fill="#16213e" stroke="#f6c90e" stroke-width="1.5"/>
  <text x="290" y="243" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#718096" text-anchor="middle">arg 2</text>
  <text x="290" y="260" font-family="'Courier New', monospace" font-size="12" fill="#f6c90e" text-anchor="middle">phone_mobile</text>

  <!-- Flecha arg2 derecha -->
  <line x1="380" y1="247" x2="430" y2="247" stroke="#56b6c2" stroke-width="2"/>
  <polygon points="430,241 442,247 430,253" fill="#56b6c2"/>

  <!-- Diamante 2 -->
  <polygon points="485,222 535,247 485,272 435,247" fill="#16213e" stroke="#56b6c2" stroke-width="1.5"/>
  <text x="485" y="244" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56b6c2" text-anchor="middle">¿es</text>
  <text x="485" y="257" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#56b6c2" text-anchor="middle">NULL?</text>

  <!-- No → devuelve -->
  <line x1="535" y1="247" x2="580" y2="247" stroke="#98c379" stroke-width="2"/>
  <polygon points="580,241 592,247 580,253" fill="#98c379"/>
  <text x="555" y="240" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#98c379" text-anchor="middle">NO</text>

  <rect x="592" y="222" width="130" height="50" rx="8" fill="#1a1a2e" stroke="#98c379" stroke-width="2"/>
  <text x="657" y="243" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#98c379" text-anchor="middle">RETORNA</text>
  <text x="657" y="260" font-family="'Courier New', monospace" font-size="11" fill="#f6c90e" text-anchor="middle">phone_mobile</text>

  <!-- Sí ↓ -->
  <line x1="485" y1="272" x2="485" y2="302" stroke="#e06c75" stroke-width="2"/>
  <polygon points="479,302 485,314 491,302" fill="#e06c75"/>
  <text x="497" y="292" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#e06c75">SÍ</text>

  <!-- Arg 3 (fallback) -->
  <rect x="380" y="314" width="210" height="50" rx="8" fill="#16213e" stroke="#98c379" stroke-width="2"/>
  <text x="485" y="335" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#718096" text-anchor="middle">arg 3 (fallback)</text>
  <text x="485" y="352" font-family="'Courier New', monospace" font-size="12" fill="#98c379" text-anchor="middle">'Sin teléfono'</text>

  <!-- Nota -->
  <text x="410" y="396" font-family="Inter, Roboto, sans-serif" font-size="10"
        fill="#718096" text-anchor="middle">Bootcamp SQL — Semana 07: COALESCE evalúa de izquierda a derecha</text>
</svg>
