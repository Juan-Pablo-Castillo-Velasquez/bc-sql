<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" width="780" height="360">
  <rect width="780" height="360" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="390" y="30" font-family="Inter, Roboto, sans-serif" font-size="16"
        font-weight="bold" fill="#e2e8f0" text-anchor="middle">
    Pipeline de Full-Text Search en PostgreSQL
  </text>

  <!-- Etapa 1: Texto original -->
  <rect x="20" y="60" width="140" height="70" rx="6" fill="#16213e" stroke="#336791" stroke-width="2"/>
  <text x="90" y="85" font-family="Inter, Roboto, sans-serif" font-size="12"
        font-weight="bold" fill="#336791" text-anchor="middle">Texto original</text>
  <text x="90" y="103" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#e2e8f0" text-anchor="middle">"Bases de datos</text>
  <text x="90" y="118" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#e2e8f0" text-anchor="middle">relacionales SQL"</text>

  <!-- Flecha 1→2 -->
  <path d="M160 95 L200 95" stroke="#56b6c2" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <text x="180" y="88" font-family="Inter, Roboto, sans-serif" font-size="10"
        fill="#56b6c2" text-anchor="middle">to_tsvector</text>
  <text x="180" y="108" font-family="Inter, Roboto, sans-serif" font-size="10"
        fill="#56b6c2" text-anchor="middle">('spanish',…)</text>

  <!-- Etapa 2: tsvector -->
  <rect x="200" y="60" width="160" height="70" rx="6" fill="#16213e" stroke="#c678dd" stroke-width="2"/>
  <text x="280" y="82" font-family="Inter, Roboto, sans-serif" font-size="12"
        font-weight="bold" fill="#c678dd" text-anchor="middle">tsvector</text>
  <text x="280" y="100" font-family="courier new, monospace" font-size="10"
        fill="#98c379" text-anchor="middle">'bas':1 'dato':2</text>
  <text x="280" y="116" font-family="courier new, monospace" font-size="10"
        fill="#98c379" text-anchor="middle">'relacionl':3 'sql':4</text>

  <!-- Flecha 2→3 -->
  <path d="M360 95 L400 95" stroke="#56b6c2" stroke-width="2" fill="none" marker-end="url(#a1)"/>
  <text x="380" y="88" font-family="Inter, Roboto, sans-serif" font-size="10"
        fill="#56b6c2" text-anchor="middle">GIN</text>
  <text x="380" y="108" font-family="Inter, Roboto, sans-serif" font-size="10"
        fill="#56b6c2" text-anchor="middle">index</text>

  <!-- Etapa 3: Índice GIN -->
  <rect x="400" y="50" width="160" height="100" rx="6" fill="#0d1b2a" stroke="#f6c90e" stroke-width="2"/>
  <text x="480" y="74" font-family="Inter, Roboto, sans-serif" font-size="12"
        font-weight="bold" fill="#f6c90e" text-anchor="middle">Índice GIN</text>
  <text x="416" y="94" font-family="courier new, monospace" font-size="10" fill="#e2e8f0">'bas'     → [1,3,7]</text>
  <text x="416" y="110" font-family="courier new, monospace" font-size="10" fill="#e2e8f0">'dato'    → [1,2,5]</text>
  <text x="416" y="126" font-family="courier new, monospace" font-size="10" fill="#e2e8f0">'sql'     → [1,4,8]</text>
  <text x="416" y="142" font-family="courier new, monospace" font-size="10" fill="#e2e8f0">'relacionl'→ [1,3]</text>

  <!-- tsquery abajo -->
  <rect x="20" y="200" width="140" height="70" rx="6" fill="#16213e" stroke="#e06c75" stroke-width="2"/>
  <text x="90" y="222" font-family="Inter, Roboto, sans-serif" font-size="12"
        font-weight="bold" fill="#e06c75" text-anchor="middle">Consulta</text>
  <text x="90" y="240" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#e2e8f0" text-anchor="middle">"base de datos"</text>
  <text x="90" y="256" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#e2e8f0" text-anchor="middle">plainto_tsquery</text>

  <!-- Flecha consulta → tsquery -->
  <path d="M160 235 L200 235" stroke="#56b6c2" stroke-width="2" fill="none" marker-end="url(#a1)"/>

  <rect x="200" y="200" width="160" height="70" rx="6" fill="#16213e" stroke="#e06c75" stroke-width="2"/>
  <text x="280" y="222" font-family="Inter, Roboto, sans-serif" font-size="12"
        font-weight="bold" fill="#e06c75" text-anchor="middle">tsquery</text>
  <text x="280" y="242" font-family="courier new, monospace" font-size="11"
        fill="#98c379" text-anchor="middle">'bas' &amp; 'dato'</text>

  <!-- Flecha tsquery → operador @@ -->
  <path d="M360 235 L400 235" stroke="#56b6c2" stroke-width="2" fill="none" marker-end="url(#a1)"/>

  <!-- Operador @@ -->
  <rect x="400" y="195" width="160" height="80" rx="6" fill="#16213e" stroke="#56b6c2" stroke-width="2"/>
  <text x="480" y="220" font-family="Inter, Roboto, sans-serif" font-size="18"
        font-weight="bold" fill="#56b6c2" text-anchor="middle">@@</text>
  <text x="480" y="242" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#718096" text-anchor="middle">tsvector @@ tsquery</text>
  <text x="480" y="260" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#718096" text-anchor="middle">→ TRUE / FALSE</text>

  <!-- Flechas verticales GIN → @@ -->
  <path d="M480 150 L480 195" stroke="#f6c90e" stroke-width="1.5" fill="none"
        stroke-dasharray="4,3" marker-end="url(#a2)"/>

  <!-- Flecha resultado -->
  <path d="M560 235 L610 235" stroke="#98c379" stroke-width="2" fill="none" marker-end="url(#a3)"/>

  <!-- Resultado -->
  <rect x="610" y="190" width="150" height="90" rx="6" fill="#16213e" stroke="#98c379" stroke-width="2"/>
  <text x="685" y="212" font-family="Inter, Roboto, sans-serif" font-size="12"
        font-weight="bold" fill="#98c379" text-anchor="middle">Resultados</text>
  <text x="685" y="232" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#e2e8f0" text-anchor="middle">filas 1, 2, 5...</text>
  <text x="685" y="250" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#718096" text-anchor="middle">ordenadas por</text>
  <text x="685" y="266" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#718096" text-anchor="middle">ts_rank()</text>

  <!-- ts_rank box -->
  <rect x="610" y="60" width="150" height="100" rx="6" fill="#0d1b2a" stroke="#98c379" stroke-width="1.5"/>
  <text x="685" y="82" font-family="Inter, Roboto, sans-serif" font-size="12"
        font-weight="bold" fill="#98c379" text-anchor="middle">ts_rank()</text>
  <text x="685" y="102" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#718096" text-anchor="middle">fila 1: 0.91</text>
  <text x="685" y="118" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#718096" text-anchor="middle">fila 5: 0.73</text>
  <text x="685" y="134" font-family="Inter, Roboto, sans-serif" font-size="11"
        fill="#718096" text-anchor="middle">fila 2: 0.61</text>
  <path d="M685 160 L685 190" stroke="#98c379" stroke-width="1.5" fill="none"
        stroke-dasharray="4,3" marker-end="url(#a3)"/>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#56b6c2"/>
    </marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f6c90e"/>
    </marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#98c379"/>
    </marker>
  </defs>
</svg>
