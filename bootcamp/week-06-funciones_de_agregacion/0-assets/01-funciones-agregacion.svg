<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" width="720" height="330" font-family="Inter, Roboto, Open Sans, sans-serif">
  <rect width="720" height="330" fill="#1a1a2e"/>
  <text x="360" y="34" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">Funciones de Agregación — Semana 06</text>

  <rect x="40" y="52" width="640" height="90" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="58" y="74" fill="#c678dd" font-size="13" font-weight="700" font-family="monospace">SELECT</text>
  <text x="58" y="94" fill="#f6c90e" font-size="13" font-family="monospace">    COUNT(*)</text>
  <text x="168" y="94" fill="#718096" font-size="13" font-family="monospace"> AS total,</text>
  <text x="260" y="94" fill="#f6c90e" font-size="13" font-family="monospace"> SUM(salary)</text>
  <text x="380" y="94" fill="#718096" font-size="13" font-family="monospace"> AS masa,</text>
  <text x="468" y="94" fill="#f6c90e" font-size="13" font-family="monospace"> AVG(salary)</text>
  <text x="584" y="94" fill="#718096" font-size="13" font-family="monospace"> AS prom</text>
  <text x="58" y="114" fill="#c678dd" font-size="13" font-weight="700" font-family="monospace">FROM</text>
  <text x="102" y="114" fill="#e06c75" font-size="13" font-family="monospace">   employees;</text>

  <!-- Cuadros resumen de funciones -->
  <rect x="40"  y="162" width="116" height="70" rx="4" fill="#16213e" stroke="#56b6c2" stroke-width="1.5"/>
  <text x="98"  y="182" text-anchor="middle" fill="#56b6c2" font-size="12" font-weight="700">COUNT(*)</text>
  <text x="98"  y="200" text-anchor="middle" fill="#a0aec0" font-size="11">Total filas</text>
  <text x="98"  y="218" text-anchor="middle" fill="#718096" font-size="10">incluye NULLs</text>

  <rect x="168" y="162" width="116" height="70" rx="4" fill="#16213e" stroke="#98c379" stroke-width="1.5"/>
  <text x="226" y="182" text-anchor="middle" fill="#98c379" font-size="12" font-weight="700">SUM(col)</text>
  <text x="226" y="200" text-anchor="middle" fill="#a0aec0" font-size="11">Suma total</text>
  <text x="226" y="218" text-anchor="middle" fill="#718096" font-size="10">ignora NULLs</text>

  <rect x="296" y="162" width="116" height="70" rx="4" fill="#16213e" stroke="#f6c90e" stroke-width="1.5"/>
  <text x="354" y="182" text-anchor="middle" fill="#f6c90e" font-size="12" font-weight="700">AVG(col)</text>
  <text x="354" y="200" text-anchor="middle" fill="#a0aec0" font-size="11">Promedio</text>
  <text x="354" y="218" text-anchor="middle" fill="#718096" font-size="10">ignora NULLs</text>

  <rect x="424" y="162" width="116" height="70" rx="4" fill="#16213e" stroke="#c678dd" stroke-width="1.5"/>
  <text x="482" y="182" text-anchor="middle" fill="#c678dd" font-size="12" font-weight="700">MIN(col)</text>
  <text x="482" y="200" text-anchor="middle" fill="#a0aec0" font-size="11">Mínimo</text>
  <text x="482" y="218" text-anchor="middle" fill="#718096" font-size="10">ignora NULLs</text>

  <rect x="552" y="162" width="128" height="70" rx="4" fill="#16213e" stroke="#e06c75" stroke-width="1.5"/>
  <text x="616" y="182" text-anchor="middle" fill="#e06c75" font-size="12" font-weight="700">MAX(col)</text>
  <text x="616" y="200" text-anchor="middle" fill="#a0aec0" font-size="11">Máximo</text>
  <text x="616" y="218" text-anchor="middle" fill="#718096" font-size="10">ignora NULLs</text>

  <rect x="40" y="252" width="640" height="52" rx="6" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="360" y="272" text-anchor="middle" fill="#a0aec0" font-size="11" font-weight="600">WHERE filtra filas ANTES de la agregación</text>
  <text x="360" y="290" text-anchor="middle" fill="#718096" font-size="11">SELECT AVG(salary) FROM employees WHERE department_id = 1;</text>
</svg>
