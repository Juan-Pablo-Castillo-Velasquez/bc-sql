<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" width="720" height="330" font-family="Inter, Roboto, Open Sans, sans-serif">
  <rect width="720" height="330" fill="#1a1a2e"/>
  <text x="360" y="34" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">WHERE vs HAVING — Semana 06</text>

  <rect x="40" y="52" width="300" height="130" rx="6" fill="#2d1515" stroke="#e06c75" stroke-width="1.5"/>
  <text x="190" y="72" text-anchor="middle" fill="#e06c75" font-size="11" font-weight="700">WHERE — filtra FILAS (antes de agrupar)</text>
  <text x="58" y="94"  fill="#c678dd" font-size="12" font-family="monospace">SELECT</text>
  <text x="58" y="112" fill="#f6c90e" font-size="12" font-family="monospace">    department_id, AVG(salary)</text>
  <text x="58" y="130" fill="#c678dd" font-size="12" font-family="monospace">FROM</text>
  <text x="100" y="130" fill="#e06c75" font-size="12" font-family="monospace"> employees</text>
  <text x="58" y="148" fill="#56b6c2" font-size="12" font-family="monospace" font-weight="700">WHERE</text>
  <text x="110" y="148" fill="#e2e8f0" font-size="12" font-family="monospace"> salary &gt; 50000</text>
  <text x="58" y="166" fill="#c678dd" font-size="12" font-family="monospace">GROUP BY</text>
  <text x="142" y="166" fill="#f6c90e" font-size="12" font-family="monospace"> department_id;</text>

  <rect x="380" y="52" width="300" height="130" rx="6" fill="#152d15" stroke="#68d391" stroke-width="1.5"/>
  <text x="530" y="72" text-anchor="middle" fill="#68d391" font-size="11" font-weight="700">HAVING — filtra GRUPOS (después de agregar)</text>
  <text x="398" y="94"  fill="#c678dd" font-size="12" font-family="monospace">SELECT</text>
  <text x="398" y="112" fill="#f6c90e" font-size="12" font-family="monospace">    department_id, COUNT(*)</text>
  <text x="398" y="130" fill="#c678dd" font-size="12" font-family="monospace">FROM</text>
  <text x="440" y="130" fill="#e06c75" font-size="12" font-family="monospace"> employees</text>
  <text x="398" y="148" fill="#c678dd" font-size="12" font-family="monospace">GROUP BY</text>
  <text x="482" y="148" fill="#f6c90e" font-size="12" font-family="monospace"> department_id</text>
  <text x="398" y="166" fill="#68d391" font-size="12" font-family="monospace" font-weight="700">HAVING</text>
  <text x="456" y="166" fill="#e2e8f0" font-size="12" font-family="monospace"> COUNT(*) &gt; 2;</text>

  <!-- Regla de oro -->
  <rect x="40" y="202" width="640" height="100" rx="6" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="360" y="224" text-anchor="middle" fill="#a0aec0" font-size="12" font-weight="600">Regla de oro</text>
  <text x="60"  y="250" fill="#e06c75" font-size="12">WHERE</text>
  <text x="114" y="250" fill="#718096" font-size="11"> filtra columnas individuales → se ejecuta ANTES del GROUP BY</text>
  <text x="60"  y="272" fill="#68d391" font-size="12">HAVING</text>
  <text x="122" y="272" fill="#718096" font-size="11"> filtra resultados de COUNT/SUM/AVG → se ejecuta DESPUÉS del GROUP BY</text>
  <text x="60"  y="292" fill="#a0aec0" font-size="11">Ambos pueden coexistir en la misma consulta</text>
</svg>
