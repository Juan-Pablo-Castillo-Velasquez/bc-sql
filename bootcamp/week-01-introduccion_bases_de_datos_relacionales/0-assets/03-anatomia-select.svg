<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" font-family="Inter, Roboto, Open Sans, sans-serif">
  <!-- Fondo -->
  <rect width="720" height="400" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="360" y="36" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">Anatomía de un SELECT — Semana 01</text>

  <!-- Bloque código -->
  <rect x="60" y="56" width="600" height="150" rx="6" fill="#16213e" stroke="#2d3748" stroke-width="1"/>

  <!-- Línea SELECT -->
  <text x="86" y="90" fill="#c678dd" font-size="15" font-weight="700" font-family="monospace">SELECT</text>
  <text x="166" y="90" fill="#e2e8f0" font-size="15" font-family="monospace">name, price</text>

  <!-- Línea FROM -->
  <text x="86" y="115" fill="#c678dd" font-size="15" font-weight="700" font-family="monospace">FROM</text>
  <text x="150" y="115" fill="#e06c75" font-size="15" font-family="monospace">  products</text>

  <!-- Línea WHERE -->
  <text x="86" y="140" fill="#c678dd" font-size="15" font-weight="700" font-family="monospace">WHERE</text>
  <text x="160" y="140" fill="#e2e8f0" font-size="15" font-family="monospace"> price &gt; 10</text>

  <!-- Línea ORDER BY -->
  <text x="86" y="165" fill="#c678dd" font-size="15" font-weight="700" font-family="monospace">ORDER BY</text>
  <text x="204" y="165" fill="#e2e8f0" font-size="15" font-family="monospace"> price </text>
  <text x="270" y="165" fill="#56b6c2" font-size="15" font-family="monospace">DESC</text>
  <text x="318" y="165" fill="#718096" font-size="15" font-family="monospace">;</text>

  <!-- Línea punto y coma -->

  <!-- Etiquetas con flechas -->
  <!-- SELECT -->
  <line x1="86" y1="94" x2="86" y2="230" stroke="#c678dd" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="40" y="230" width="100" height="46" rx="4" fill="#2d3748"/>
  <text x="90" y="249" text-anchor="middle" fill="#c678dd" font-size="11" font-weight="700">SELECT</text>
  <text x="90" y="265" text-anchor="middle" fill="#a0aec0" font-size="10">¿Qué columnas?</text>

  <!-- FROM -->
  <line x1="152" y1="119" x2="210" y2="230" stroke="#e06c75" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="160" y="230" width="100" height="46" rx="4" fill="#2d3748"/>
  <text x="210" y="249" text-anchor="middle" fill="#e06c75" font-size="11" font-weight="700">FROM</text>
  <text x="210" y="265" text-anchor="middle" fill="#a0aec0" font-size="10">¿De qué tabla?</text>

  <!-- WHERE -->
  <line x1="162" y1="144" x2="330" y2="230" stroke="#98c379" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="280" y="230" width="100" height="46" rx="4" fill="#2d3748"/>
  <text x="330" y="249" text-anchor="middle" fill="#98c379" font-size="11" font-weight="700">WHERE</text>
  <text x="330" y="265" text-anchor="middle" fill="#a0aec0" font-size="10">¿Qué filas?</text>

  <!-- ORDER BY -->
  <line x1="210" y1="169" x2="460" y2="230" stroke="#56b6c2" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="410" y="230" width="120" height="46" rx="4" fill="#2d3748"/>
  <text x="470" y="249" text-anchor="middle" fill="#56b6c2" font-size="11" font-weight="700">ORDER BY</text>
  <text x="470" y="265" text-anchor="middle" fill="#a0aec0" font-size="10">¿En qué orden?</text>

  <!-- DESC/ASC -->
  <rect x="570" y="230" width="90" height="46" rx="4" fill="#2d3748"/>
  <text x="615" y="249" text-anchor="middle" fill="#56b6c2" font-size="11" font-weight="700">DESC / ASC</text>
  <text x="615" y="265" text-anchor="middle" fill="#a0aec0" font-size="10">dirección</text>

  <!-- Resultado flecha -->
  <text x="360" y="320" text-anchor="middle" fill="#68d391" font-size="12">↓ resultado: filas filtradas y ordenadas</text>
  <rect x="200" y="334" width="320" height="44" rx="4" fill="#16213e" stroke="#336791" stroke-width="1"/>
  <text x="360" y="352" text-anchor="middle" fill="#a0aec0" font-size="11">name         | price</text>
  <text x="360" y="369" text-anchor="middle" fill="#e2e8f0" font-size="11">Backpack     | 45.00</text>
</svg>
