<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380" font-family="Inter, Roboto, Open Sans, sans-serif">
  <!-- Fondo -->
  <rect width="720" height="380" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="360" y="36" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">Anatomía de una Tabla — Semana 01</text>

  <!-- Nombre de tabla -->
  <rect x="60" y="56" width="600" height="36" rx="4" fill="#336791"/>
  <text x="360" y="79" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">products</text>
  <!-- Flecha nombre de tabla -->
  <line x1="360" y1="92" x2="360" y2="110" stroke="#336791" stroke-width="1.5"/>
  <text x="370" y="107" fill="#68d391" font-size="11">← nombre de la tabla</text>

  <!-- Encabezado columnas -->
  <rect x="60" y="120" width="120" height="32" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
  <text x="120" y="140" text-anchor="middle" fill="#f6c90e" font-size="12" font-weight="700">id</text>

  <rect x="180" y="120" width="180" height="32" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
  <text x="270" y="140" text-anchor="middle" fill="#f6c90e" font-size="12" font-weight="700">name</text>

  <rect x="360" y="120" width="120" height="32" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
  <text x="420" y="140" text-anchor="middle" fill="#f6c90e" font-size="12" font-weight="700">price</text>

  <rect x="480" y="120" width="180" height="32" fill="#2d3748" stroke="#4a5568" stroke-width="1"/>
  <text x="570" y="140" text-anchor="middle" fill="#f6c90e" font-size="12" font-weight="700">category</text>

  <!-- Etiqueta columnas -->
  <text x="360" y="166" text-anchor="middle" fill="#68d391" font-size="11">↑ columnas (atributos)</text>

  <!-- Fila 1 -->
  <rect x="60" y="172" width="120" height="30" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="120" y="191" text-anchor="middle" fill="#e2e8f0" font-size="12">1</text>
  <rect x="180" y="172" width="180" height="30" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="270" y="191" text-anchor="middle" fill="#e2e8f0" font-size="12">Notebook</text>
  <rect x="360" y="172" width="120" height="30" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="420" y="191" text-anchor="middle" fill="#e2e8f0" font-size="12">15.99</text>
  <rect x="480" y="172" width="180" height="30" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="570" y="191" text-anchor="middle" fill="#e2e8f0" font-size="12">stationery</text>

  <!-- Fila 2 -->
  <rect x="60" y="202" width="120" height="30" fill="#1e2a45" stroke="#2d3748" stroke-width="1"/>
  <text x="120" y="221" text-anchor="middle" fill="#e2e8f0" font-size="12">2</text>
  <rect x="180" y="202" width="180" height="30" fill="#1e2a45" stroke="#2d3748" stroke-width="1"/>
  <text x="270" y="221" text-anchor="middle" fill="#e2e8f0" font-size="12">Pen</text>
  <rect x="360" y="202" width="120" height="30" fill="#1e2a45" stroke="#2d3748" stroke-width="1"/>
  <text x="420" y="221" text-anchor="middle" fill="#e2e8f0" font-size="12">2.50</text>
  <rect x="480" y="202" width="180" height="30" fill="#1e2a45" stroke="#2d3748" stroke-width="1"/>
  <text x="570" y="221" text-anchor="middle" fill="#e2e8f0" font-size="12">stationery</text>

  <!-- Fila 3 resaltada (celda) -->
  <rect x="60" y="232" width="120" height="30" fill="#1e2a45" stroke="#2d3748" stroke-width="1"/>
  <text x="120" y="251" text-anchor="middle" fill="#e2e8f0" font-size="12">3</text>
  <rect x="180" y="232" width="180" height="30" fill="#1e2a45" stroke="#2d3748" stroke-width="1"/>
  <text x="270" y="251" text-anchor="middle" fill="#e2e8f0" font-size="12">Backpack</text>
  <rect x="360" y="232" width="120" height="30" fill="#2c4a6e" stroke="#336791" stroke-width="2"/>
  <text x="420" y="251" text-anchor="middle" fill="#68d391" font-size="12" font-weight="700">45.00</text>
  <rect x="480" y="232" width="180" height="30" fill="#1e2a45" stroke="#2d3748" stroke-width="1"/>
  <text x="570" y="251" text-anchor="middle" fill="#e2e8f0" font-size="12">bags</text>

  <!-- Etiquetas fila y celda -->
  <text x="40" y="221" text-anchor="end" fill="#68d391" font-size="11">fila →</text>
  <text x="420" y="280" text-anchor="middle" fill="#68d391" font-size="11">↑ celda (valor único)</text>
</svg>
