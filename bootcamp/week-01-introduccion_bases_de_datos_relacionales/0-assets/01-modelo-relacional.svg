<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" font-family="Inter, Roboto, Open Sans, sans-serif">
  <!-- Fondo -->
  <rect width="720" height="400" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="360" y="36" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">Modelo Relacional Básico — Semana 01</text>

  <!-- === Tabla customers === -->
  <rect x="60" y="60" width="240" height="34" rx="4" fill="#336791"/>
  <text x="180" y="82" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">customers</text>

  <rect x="60" y="94" width="240" height="28" fill="#16213e"/>
  <text x="80" y="113" fill="#f6c90e" font-size="12">PK</text>
  <text x="110" y="113" fill="#e2e8f0" font-size="12">id</text>
  <text x="200" y="113" fill="#718096" font-size="11">INTEGER</text>

  <rect x="60" y="122" width="240" height="28" fill="#1e2a45"/>
  <text x="110" y="141" fill="#e2e8f0" font-size="12">name</text>
  <text x="200" y="141" fill="#718096" font-size="11">TEXT</text>

  <rect x="60" y="150" width="240" height="28" fill="#16213e"/>
  <text x="110" y="169" fill="#e2e8f0" font-size="12">email</text>
  <text x="200" y="169" fill="#718096" font-size="11">TEXT</text>

  <!-- === Tabla orders === -->
  <rect x="420" y="60" width="240" height="34" rx="4" fill="#336791"/>
  <text x="540" y="82" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">orders</text>

  <rect x="420" y="94" width="240" height="28" fill="#16213e"/>
  <text x="440" y="113" fill="#f6c90e" font-size="12">PK</text>
  <text x="470" y="113" fill="#e2e8f0" font-size="12">id</text>
  <text x="560" y="113" fill="#718096" font-size="11">INTEGER</text>

  <rect x="420" y="122" width="240" height="28" fill="#1e2a45"/>
  <text x="440" y="141" fill="#e06c75" font-size="12">FK</text>
  <text x="470" y="141" fill="#e2e8f0" font-size="12">customer_id</text>
  <text x="560" y="141" fill="#718096" font-size="11">INTEGER</text>

  <rect x="420" y="150" width="240" height="28" fill="#16213e"/>
  <text x="470" y="169" fill="#e2e8f0" font-size="12">total</text>
  <text x="560" y="169" fill="#718096" font-size="11">REAL</text>

  <rect x="420" y="178" width="240" height="28" fill="#1e2a45"/>
  <text x="470" y="197" fill="#e2e8f0" font-size="12">order_date</text>
  <text x="560" y="197" fill="#718096" font-size="11">TEXT</text>

  <!-- Línea de relación -->
  <line x1="300" y1="135" x2="420" y2="135" stroke="#336791" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Cardinalidad 1 -->
  <text x="308" y="129" fill="#a0aec0" font-size="13" font-weight="700">1</text>
  <!-- Cardinalidad N -->
  <text x="396" y="129" fill="#a0aec0" font-size="13" font-weight="700">N</text>

  <!-- Etiqueta relación -->
  <text x="360" y="125" text-anchor="middle" fill="#68d391" font-size="11">tiene</text>

  <!-- Leyenda -->
  <rect x="60" y="310" width="600" height="64" rx="6" fill="#16213e"/>
  <text x="80" y="332" fill="#f6c90e" font-size="12" font-weight="700">PK</text>
  <text x="100" y="332" fill="#a0aec0" font-size="12">Clave primaria — identifica de forma única cada fila</text>
  <text x="80" y="356" fill="#e06c75" font-size="12" font-weight="700">FK</text>
  <text x="100" y="356" fill="#a0aec0" font-size="12">Clave foránea — referencia a la PK de otra tabla</text>
</svg>
