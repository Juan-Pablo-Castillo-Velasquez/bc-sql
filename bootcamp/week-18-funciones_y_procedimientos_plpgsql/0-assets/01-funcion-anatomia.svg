<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <!-- Fondo -->
  <rect width="760" height="440" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="380" y="36" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">Anatomía de una función PL/pgSQL</text>

  <!-- Bloque principal -->
  <rect x="60" y="56" width="640" height="356" rx="10" fill="#16213e" stroke="#336791" stroke-width="2"/>

  <!-- Línea 1: CREATE OR REPLACE -->
  <rect x="60" y="56" width="640" height="36" rx="10" fill="#336791"/>
  <text x="380" y="80" fill="#e2e8f0" font-size="13" text-anchor="middle" font-family="monospace">CREATE OR REPLACE FUNCTION fn_nombre(p_value NUMERIC)</text>

  <!-- Línea 2: RETURNS -->
  <rect x="80" y="100" width="600" height="28" rx="6" fill="#1a1a2e"/>
  <text x="160" y="119" fill="#c678dd" font-size="12" font-family="monospace">RETURNS NUMERIC</text>
  <text x="420" y="119" fill="#718096" font-size="11">← tipo de retorno: escalar, TABLE, VOID…</text>

  <!-- Línea 3: LANGUAGE -->
  <rect x="80" y="135" width="600" height="28" rx="6" fill="#1a1a2e"/>
  <text x="160" y="154" fill="#c678dd" font-size="12" font-family="monospace">LANGUAGE plpgsql</text>
  <text x="370" y="154" fill="#718096" font-size="11">← motor de ejecución</text>

  <!-- Línea 4: AS $$ -->
  <rect x="80" y="170" width="600" height="22" rx="4" fill="#1a1a2e"/>
  <text x="160" y="185" fill="#f6c90e" font-size="12" font-family="monospace">AS $$</text>
  <text x="220" y="185" fill="#718096" font-size="11">    ← delimitador de bloque</text>

  <!-- DECLARE block -->
  <rect x="100" y="198" width="560" height="48" rx="6" fill="#0d1b2a" stroke="#56b6c2" stroke-width="1"/>
  <text x="130" y="217" fill="#56b6c2" font-size="12" font-family="monospace" font-weight="700">DECLARE</text>
  <text x="130" y="236" fill="#98c379" font-size="11" font-family="monospace">    v_result  NUMERIC := 0;</text>
  <text x="490" y="227" fill="#718096" font-size="10">variables locales</text>

  <!-- BEGIN block -->
  <rect x="100" y="252" width="560" height="100" rx="6" fill="#0d1b2a" stroke="#c678dd" stroke-width="1"/>
  <text x="130" y="271" fill="#c678dd" font-size="12" font-family="monospace" font-weight="700">BEGIN</text>
  <text x="130" y="292" fill="#e2e8f0" font-size="11" font-family="monospace">    v_result := ROUND(p_value / 12, 2);</text>
  <text x="130" y="312" fill="#e06c75" font-size="11" font-family="monospace">    -- IF / LOOP / FOR / RETURN QUERY</text>
  <text x="130" y="332" fill="#e2e8f0" font-size="11" font-family="monospace">    RETURN v_result;</text>

  <!-- END block -->
  <rect x="100" y="358" width="560" height="28" rx="4" fill="#0d1b2a" stroke="#c678dd" stroke-width="1"/>
  <text x="130" y="377" fill="#c678dd" font-size="12" font-family="monospace" font-weight="700">END;</text>

  <!-- Cierre $$ -->
  <text x="160" y="412" fill="#f6c90e" font-size="12" font-family="monospace">$$;</text>
  <text x="220" y="412" fill="#718096" font-size="11">    ← cierre del delimitador</text>

  <!-- Nota -->
  <text x="380" y="432" fill="#718096" font-size="10" text-anchor="middle">CREATE OR REPLACE sobreescribe si ya existe; no necesitas DROP primero</text>
</svg>
