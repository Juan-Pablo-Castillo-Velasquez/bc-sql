<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" width="780" height="420">
  <rect width="780" height="420" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="390" y="32" font-family="Inter, Roboto, sans-serif" font-size="17" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Índice B-tree — estructura y efecto en consultas</text>

  <!-- LEFT: Table without index -->
  <text x="155" y="60" font-family="Inter, Roboto, sans-serif" font-size="13" fill="#e06c75" font-weight="bold" text-anchor="middle">Sin índice — Sequential Scan</text>

  <!-- Table block -->
  <rect x="30" y="72" width="250" height="200" rx="6" fill="#16213e" stroke="#336791" stroke-width="1"/>
  <text x="155" y="90" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#718096" text-anchor="middle">employees</text>

  <!-- Rows — all highlighted red (full scan) -->
  <rect x="44" y="98"  width="222" height="22" rx="3" fill="#3d1a1a"/>
  <text x="75"  y="113" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e2e8f0">1</text>
  <text x="155" y="113" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e06c75" text-anchor="middle">→ leer</text>
  <rect x="44" y="124" width="222" height="22" rx="3" fill="#3d1a1a"/>
  <text x="75"  y="139" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e2e8f0">2</text>
  <text x="155" y="139" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e06c75" text-anchor="middle">→ leer</text>
  <rect x="44" y="150" width="222" height="22" rx="3" fill="#1e3d1e"/>
  <text x="75"  y="165" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e2e8f0">3</text>
  <text x="155" y="165" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#98c379" font-weight="bold" text-anchor="middle">✓ encontrado</text>
  <rect x="44" y="176" width="222" height="22" rx="3" fill="#3d1a1a"/>
  <text x="75"  y="191" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e2e8f0">4</text>
  <text x="155" y="191" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e06c75" text-anchor="middle">→ leer</text>
  <rect x="44" y="202" width="222" height="22" rx="3" fill="#3d1a1a"/>
  <text x="75"  y="217" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e2e8f0">5</text>
  <text x="155" y="217" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e06c75" text-anchor="middle">→ leer</text>
  <rect x="44" y="228" width="222" height="22" rx="3" fill="#3d1a1a"/>
  <text x="75"  y="243" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e2e8f0">…</text>
  <text x="155" y="243" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e06c75" text-anchor="middle">→ leer</text>

  <text x="155" y="290" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#e06c75" text-anchor="middle">O(n) — recorre toda la tabla</text>

  <!-- RIGHT: B-tree index diagram -->
  <text x="560" y="60" font-family="Inter, Roboto, sans-serif" font-size="13" fill="#98c379" font-weight="bold" text-anchor="middle">Con índice — Index Scan</text>

  <!-- B-tree root node -->
  <rect x="500" y="72" width="120" height="32" rx="6" fill="#16213e" stroke="#336791" stroke-width="2"/>
  <text x="560" y="93" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#c678dd" font-weight="bold" text-anchor="middle">dept_id = 2?</text>

  <!-- Level 2 -->
  <rect x="422" y="140" width="96" height="28" rx="4" fill="#16213e" stroke="#336791" stroke-width="1"/>
  <text x="470" y="158" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#56b6c2" text-anchor="middle">&lt; 2</text>
  <rect x="602" y="140" width="96" height="28" rx="4" fill="#16213e" stroke="#336791" stroke-width="1"/>
  <text x="650" y="158" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#56b6c2" text-anchor="middle">≥ 2</text>

  <!-- Tree lines root → level2 -->
  <line x1="530" y1="104" x2="470" y2="140" stroke="#336791" stroke-width="1.5"/>
  <line x1="590" y1="104" x2="650" y2="140" stroke="#336791" stroke-width="1.5"/>

  <!-- Level 3 leafs — highlight the match -->
  <rect x="586" y="202" width="128" height="28" rx="4" fill="#1e3d1e" stroke="#98c379" stroke-width="2"/>
  <text x="650" y="220" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#98c379" font-weight="bold" text-anchor="middle">dept_id=2 → filas</text>

  <!-- Tree line level2 → leafs -->
  <line x1="650" y1="168" x2="650" y2="202" stroke="#98c379" stroke-width="1.5"/>

  <!-- Arrow from index leaf to table rows -->
  <rect x="490" y="264" width="160" height="52" rx="4" fill="#16213e" stroke="#98c379" stroke-width="1"/>
  <text x="570" y="280" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#98c379" text-anchor="middle">Solo accede a</text>
  <text x="570" y="296" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#f6c90e" text-anchor="middle">las filas necesarias</text>
  <text x="570" y="310" font-family="Inter, Roboto, sans-serif" font-size="11" fill="#718096" text-anchor="middle">O(log n)</text>
  <line x1="650" y1="230" x2="570" y2="264" stroke="#98c379" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-idx)"/>
  <defs>
    <marker id="arr-idx" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#98c379"/>
    </marker>
  </defs>

  <!-- SQL box at bottom -->
  <rect x="30" y="330" width="720" height="72" rx="6" fill="#16213e" stroke="#336791" stroke-width="1"/>
  <text x="50" y="352" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#718096">-- Crear el índice</text>
  <text x="50" y="370" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#c678dd">CREATE INDEX </text>
  <text x="165" y="370" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#f6c90e">idx_employees_department_id</text>
  <text x="394" y="370" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#c678dd"> ON </text>
  <text x="422" y="370" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#e06c75">employees </text>
  <text x="506" y="370" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#e2e8f0">(</text>
  <text x="514" y="370" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#f6c90e">department_id</text>
  <text x="620" y="370" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#e2e8f0">);</text>
  <text x="50" y="392" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#718096">-- Verificar uso del índice</text>
  <text x="256" y="392" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#c678dd">  EXPLAIN </text>
  <text x="328" y="392" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#c678dd">SELECT </text>
  <text x="384" y="392" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#e2e8f0">* </text>
  <text x="400" y="392" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#c678dd">FROM </text>
  <text x="444" y="392" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#e06c75">employees </text>
  <text x="532" y="392" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#c678dd">WHERE </text>
  <text x="589" y="392" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#f6c90e">department_id </text>
  <text x="692" y="392" font-family="Inter, Roboto, sans-serif" font-size="12" fill="#e2e8f0">= 2;</text>
</svg>
