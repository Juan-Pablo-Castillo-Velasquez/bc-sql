<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <!-- Fondo -->
  <rect width="760" height="460" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="380" y="36" fill="#e2e8f0" font-size="18" font-weight="700" text-anchor="middle">Flujo de una Transacción</text>

  <!-- ===== Flujo principal (camino feliz) ===== -->
  <!-- BEGIN -->
  <rect x="310" y="60" width="140" height="40" rx="8" fill="#336791" stroke="#56b6c2" stroke-width="1.5"/>
  <text x="380" y="85" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">BEGIN</text>

  <!-- flecha -->
  <line x1="380" y1="100" x2="380" y2="128" stroke="#56b6c2" stroke-width="2" marker-end="url(#arr-cyan)"/>

  <!-- Operación 1 -->
  <rect x="290" y="130" width="180" height="36" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="380" y="153" fill="#e2e8f0" font-size="12" text-anchor="middle">UPDATE / INSERT / DELETE</text>

  <!-- flecha -->
  <line x1="380" y1="166" x2="380" y2="194" stroke="#56b6c2" stroke-width="2" marker-end="url(#arr-cyan)"/>

  <!-- Operación 2 -->
  <rect x="290" y="196" width="180" height="36" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="380" y="219" fill="#e2e8f0" font-size="12" text-anchor="middle">UPDATE / INSERT / DELETE</text>

  <!-- flecha -->
  <line x1="380" y1="232" x2="380" y2="265" stroke="#56b6c2" stroke-width="2" marker-end="url(#arr-cyan)"/>

  <!-- Diamante de decisión -->
  <polygon points="380,270 440,310 380,350 320,310" fill="#16213e" stroke="#f6c90e" stroke-width="2"/>
  <text x="380" y="306" fill="#f6c90e" font-size="12" font-weight="700" text-anchor="middle">¿OK?</text>

  <!-- Rama YES → COMMIT -->
  <line x1="440" y1="310" x2="560" y2="310" stroke="#98c379" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="500" y="303" fill="#98c379" font-size="11" text-anchor="middle">SÍ</text>
  <rect x="562" y="288" width="120" height="44" rx="8" fill="#98c379" fill-opacity="0.15" stroke="#98c379" stroke-width="2"/>
  <text x="622" y="315" fill="#98c379" font-size="16" font-weight="700" text-anchor="middle">COMMIT</text>

  <!-- Persistido -->
  <line x1="622" y1="332" x2="622" y2="370" stroke="#98c379" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="562" y="372" width="120" height="36" rx="6" fill="#16213e" stroke="#98c379" stroke-width="1"/>
  <text x="622" y="391" fill="#98c379" font-size="11" text-anchor="middle">Cambios en disco</text>
  <text x="622" y="405" fill="#718096" font-size="10" text-anchor="middle">WAL + heap pages</text>

  <!-- Rama NO → ROLLBACK -->
  <line x1="320" y1="310" x2="178" y2="310" stroke="#e06c75" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="250" y="303" fill="#e06c75" font-size="11" text-anchor="middle">NO / Error</text>
  <rect x="78" y="288" width="100" height="44" rx="8" fill="#e06c75" fill-opacity="0.15" stroke="#e06c75" stroke-width="2"/>
  <text x="128" y="315" fill="#e06c75" font-size="16" font-weight="700" text-anchor="middle">ROLLBACK</text>

  <!-- Estado original -->
  <line x1="128" y1="332" x2="128" y2="370" stroke="#e06c75" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="68" y="372" width="120" height="36" rx="6" fill="#16213e" stroke="#e06c75" stroke-width="1"/>
  <text x="128" y="391" fill="#e06c75" font-size="11" text-anchor="middle">Estado original</text>
  <text x="128" y="405" fill="#718096" font-size="10" text-anchor="middle">sin cambios visibles</text>

  <!-- SAVEPOINT anotación lateral -->
  <rect x="295" y="330" width="170" height="30" rx="5" fill="#c678dd" fill-opacity="0.12" stroke="#c678dd" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="380" y="349" fill="#c678dd" font-size="10" text-anchor="middle">SAVEPOINT: rollback parcial posible</text>

  <!-- Nota inferior -->
  <text x="380" y="446" fill="#718096" font-size="10" text-anchor="middle">Después de ROLLBACK la conexión queda abierta; puedes iniciar un nuevo BEGIN</text>

  <!-- Definición de marcadores -->
  <defs>
    <marker id="arr-cyan" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#56b6c2"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#98c379"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e06c75"/>
    </marker>
  </defs>
</svg>
