<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320" font-family="Inter, Roboto, Open Sans, sans-serif">
  <rect width="720" height="320" fill="#1a1a2e"/>
  <text x="360" y="34" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">LIKE: Patrones de texto — Semana 05</text>

  <!-- % comodin -->
  <rect x="40" y="52" width="300" height="150" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="190" y="72" text-anchor="middle" fill="#56b6c2" font-size="11" font-weight="700">% — cero o más caracteres</text>
  <text x="58" y="96"  fill="#718096" font-size="11">Empieza con 'A':</text>
  <text x="58" y="112" fill="#f6c90e" font-size="11.5" font-family="monospace">first_name LIKE </text>
  <text x="204" y="112" fill="#98c379" font-size="11.5" font-family="monospace">'A%'</text>
  <text x="58" y="136" fill="#718096" font-size="11">Termina en '.com':</text>
  <text x="58" y="152" fill="#f6c90e" font-size="11.5" font-family="monospace">email LIKE </text>
  <text x="162" y="152" fill="#98c379" font-size="11.5" font-family="monospace">'%.com'</text>
  <text x="58" y="176" fill="#718096" font-size="11">Contiene 'son':</text>
  <text x="58" y="192" fill="#f6c90e" font-size="11.5" font-family="monospace">last_name LIKE </text>
  <text x="202" y="192" fill="#98c379" font-size="11.5" font-family="monospace">'%son%'</text>

  <!-- _ comodin -->
  <rect x="380" y="52" width="300" height="150" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="530" y="72" text-anchor="middle" fill="#56b6c2" font-size="11" font-weight="700">_ — exactamente un carácter</text>
  <text x="398" y="96"  fill="#718096" font-size="11">Exactamente 5 letras:</text>
  <text x="398" y="112" fill="#f6c90e" font-size="11.5" font-family="monospace">last_name LIKE </text>
  <text x="546" y="112" fill="#98c379" font-size="11.5" font-family="monospace">'_____'</text>
  <text x="398" y="136" fill="#718096" font-size="11">Segunda letra es 'o':</text>
  <text x="398" y="152" fill="#f6c90e" font-size="11.5" font-family="monospace">first_name LIKE </text>
  <text x="548" y="152" fill="#98c379" font-size="11.5" font-family="monospace">'_o%'</text>
  <text x="398" y="176" fill="#718096" font-size="11">Código de 3 chars:</text>
  <text x="398" y="192" fill="#f6c90e" font-size="11.5" font-family="monospace">code LIKE </text>
  <text x="494" y="192" fill="#98c379" font-size="11.5" font-family="monospace">'___'</text>

  <!-- Advertencia rendimiento -->
  <rect x="40" y="224" width="640" height="70" rx="6" fill="#2d1515" stroke="#e06c75" stroke-width="1"/>
  <text x="360" y="248" text-anchor="middle" fill="#e06c75" font-size="11" font-weight="700">Rendimiento</text>
  <text x="60"  y="266" fill="#a0aec0" font-size="11">LIKE 'texto%'  →  puede usar índice  ✓</text>
  <text x="360" y="266" fill="#a0aec0" font-size="11">LIKE '%texto%'  →  table scan completo  ✗</text>
  <text x="60"  y="283" fill="#718096" font-size="11">SQLite: LIKE es case-insensitive para letras ASCII</text>
</svg>
