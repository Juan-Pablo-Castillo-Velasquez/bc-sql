<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" width="720" height="330" font-family="Inter, Roboto, Open Sans, sans-serif">
  <rect width="720" height="330" fill="#1a1a2e"/>
  <text x="360" y="34" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">BETWEEN e IN — Semana 05</text>

  <rect x="40" y="52" width="300" height="130" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="190" y="72" text-anchor="middle" fill="#56b6c2" font-size="11" font-weight="700">BETWEEN — rango inclusivo</text>
  <text x="58" y="96"  fill="#c678dd" font-size="12" font-family="monospace">SELECT</text>
  <text x="58" y="114" fill="#f6c90e" font-size="12" font-family="monospace">    first_name, salary</text>
  <text x="58" y="132" fill="#c678dd" font-size="12" font-family="monospace">FROM</text>
  <text x="100" y="132" fill="#e06c75" font-size="12" font-family="monospace"> employees</text>
  <text x="58" y="150" fill="#c678dd" font-size="12" font-family="monospace">WHERE</text>
  <text x="106" y="150" fill="#f6c90e" font-size="12" font-family="monospace"> salary</text>
  <text x="180" y="150" fill="#56b6c2" font-size="12" font-family="monospace" font-weight="700"> BETWEEN</text>
  <text x="264" y="150" fill="#98c379" font-size="12" font-family="monospace"> 60000</text>
  <text x="58" y="168" fill="#56b6c2" font-size="12" font-family="monospace" font-weight="700">       AND</text>
  <text x="124" y="168" fill="#98c379" font-size="12" font-family="monospace"> 75000;</text>

  <rect x="380" y="52" width="300" height="130" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="530" y="72" text-anchor="middle" fill="#56b6c2" font-size="11" font-weight="700">IN — lista de valores</text>
  <text x="398" y="96"  fill="#c678dd" font-size="12" font-family="monospace">SELECT</text>
  <text x="398" y="114" fill="#f6c90e" font-size="12" font-family="monospace">    first_name, dept_id</text>
  <text x="398" y="132" fill="#c678dd" font-size="12" font-family="monospace">FROM</text>
  <text x="440" y="132" fill="#e06c75" font-size="12" font-family="monospace"> employees</text>
  <text x="398" y="150" fill="#c678dd" font-size="12" font-family="monospace">WHERE</text>
  <text x="446" y="150" fill="#f6c90e" font-size="12" font-family="monospace"> department_id</text>
  <text x="398" y="168" fill="#56b6c2" font-size="12" font-family="monospace" font-weight="700">    IN</text>
  <text x="436" y="168" fill="#e2e8f0" font-size="12" font-family="monospace"> (1, 3);</text>

  <!-- Equivalencias -->
  <rect x="40" y="204" width="640" height="100" rx="6" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="360" y="224" text-anchor="middle" fill="#a0aec0" font-size="12" font-weight="600">Equivalencias</text>
  <text x="60"  y="248" fill="#56b6c2" font-size="12" font-family="monospace">BETWEEN 60000 AND 75000</text>
  <text x="310" y="248" fill="#718096" font-size="11"> ≡  salary &gt;= 60000 AND salary &lt;= 75000</text>
  <text x="60"  y="270" fill="#56b6c2" font-size="12" font-family="monospace">IN (1, 3)</text>
  <text x="310" y="270" fill="#718096" font-size="11"> ≡  department_id = 1 OR department_id = 3</text>
  <text x="60"  y="292" fill="#e06c75" font-size="11">⚠️  NOT IN con NULL en la lista → devuelve 0 filas (ver Semana 07)</text>
</svg>
