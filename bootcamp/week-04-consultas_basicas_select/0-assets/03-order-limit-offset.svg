<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" font-family="Inter, Roboto, Open Sans, sans-serif">
  <rect width="720" height="360" fill="#1a1a2e"/>
  <text x="360" y="34" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">ORDER BY · LIMIT · OFFSET — Semana 04</text>

  <rect x="40" y="52" width="300" height="150" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="190" y="72" text-anchor="middle" fill="#56b6c2" font-size="11" font-weight="700">ORDER BY múltiples columnas</text>
  <text x="58" y="96"  fill="#c678dd" font-size="12" font-family="monospace">SELECT</text>
  <text x="58" y="114" fill="#f6c90e" font-size="12" font-family="monospace">    first_name,</text>
  <text x="58" y="132" fill="#f6c90e" font-size="12" font-family="monospace">    department_id</text>
  <text x="58" y="150" fill="#c678dd" font-size="12" font-family="monospace">FROM</text>
  <text x="100" y="150" fill="#e06c75" font-size="12" font-family="monospace"> employees</text>
  <text x="58" y="168" fill="#c678dd" font-size="12" font-family="monospace">ORDER BY</text>
  <text x="136" y="168" fill="#f6c90e" font-size="12" font-family="monospace"> department_id</text>
  <text x="268" y="168" fill="#56b6c2" font-size="12" font-family="monospace"> ASC,</text>
  <text x="58" y="186" fill="#f6c90e" font-size="12" font-family="monospace">         last_name</text>
  <text x="196" y="186" fill="#56b6c2" font-size="12" font-family="monospace">     ASC;</text>

  <rect x="380" y="52" width="300" height="150" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="530" y="72" text-anchor="middle" fill="#56b6c2" font-size="11" font-weight="700">LIMIT + OFFSET (paginación)</text>
  <text x="398" y="96"  fill="#c678dd" font-size="12" font-family="monospace">SELECT</text>
  <text x="398" y="114" fill="#f6c90e" font-size="12" font-family="monospace">    first_name, salary</text>
  <text x="398" y="132" fill="#c678dd" font-size="12" font-family="monospace">FROM</text>
  <text x="440" y="132" fill="#e06c75" font-size="12" font-family="monospace"> employees</text>
  <text x="398" y="150" fill="#c678dd" font-size="12" font-family="monospace">ORDER BY</text>
  <text x="476" y="150" fill="#f6c90e" font-size="12" font-family="monospace"> salary</text>
  <text x="538" y="150" fill="#56b6c2" font-size="12" font-family="monospace"> DESC</text>
  <text x="398" y="168" fill="#c678dd" font-size="12" font-family="monospace">LIMIT</text>
  <text x="440" y="168" fill="#98c379" font-size="12" font-family="monospace">  3</text>
  <text x="398" y="186" fill="#c678dd" font-size="12" font-family="monospace">OFFSET</text>
  <text x="452" y="186" fill="#98c379" font-size="12" font-family="monospace"> 3</text>
  <text x="472" y="186" fill="#718096" font-size="11"> -- página 2</text>

  <!-- Formula de paginación -->
  <rect x="40" y="224" width="640" height="110" rx="6" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="360" y="248" text-anchor="middle" fill="#a0aec0" font-size="12" font-weight="600">Fórmula de paginación</text>
  <text x="360" y="274" text-anchor="middle" fill="#98c379" font-size="14" font-family="monospace">OFFSET = (página - 1) × tamaño_de_página</text>
  <text x="140" y="300" fill="#718096" font-size="11">Página 1 → OFFSET 0</text>
  <text x="310" y="300" fill="#718096" font-size="11">Página 2 → OFFSET 3</text>
  <text x="480" y="300" fill="#718096" font-size="11">Página 3 → OFFSET 6</text>
  <text x="360" y="322" text-anchor="middle" fill="#718096" font-size="11">LIMIT sin ORDER BY devuelve filas en orden indeterminado</text>
</svg>
