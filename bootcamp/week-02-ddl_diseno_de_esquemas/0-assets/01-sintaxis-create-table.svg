<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420" font-family="Inter, Roboto, Open Sans, sans-serif">
  <rect width="720" height="420" fill="#1a1a2e"/>
  <text x="360" y="34" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">Sintaxis CREATE TABLE — Semana 02</text>

  <!-- Bloque de código principal -->
  <rect x="60" y="52" width="600" height="200" rx="6" fill="#16213e" stroke="#2d3748" stroke-width="1"/>

  <text x="86" y="84"  fill="#c678dd" font-size="14" font-weight="700" font-family="monospace">CREATE TABLE IF NOT EXISTS</text>
  <text x="380" y="84" fill="#e06c75" font-size="14" font-family="monospace"> employees</text>
  <text x="468" y="84" fill="#e2e8f0" font-size="14" font-family="monospace"> (</text>

  <text x="110" y="112" fill="#f6c90e" font-size="13" font-family="monospace">id</text>
  <text x="170" y="112" fill="#56b6c2" font-size="13" font-family="monospace">INTEGER</text>
  <text x="270" y="112" fill="#98c379" font-size="13" font-family="monospace">PRIMARY KEY</text>
  <text x="375" y="112" fill="#e2e8f0" font-size="13" font-family="monospace">,</text>

  <text x="110" y="136" fill="#f6c90e" font-size="13" font-family="monospace">first_name</text>
  <text x="230" y="136" fill="#56b6c2" font-size="13" font-family="monospace">TEXT</text>
  <text x="280" y="136" fill="#98c379" font-size="13" font-family="monospace">NOT NULL</text>
  <text x="360" y="136" fill="#e2e8f0" font-size="13" font-family="monospace">,</text>

  <text x="110" y="160" fill="#f6c90e" font-size="13" font-family="monospace">salary</text>
  <text x="200" y="160" fill="#56b6c2" font-size="13" font-family="monospace">REAL</text>
  <text x="250" y="160" fill="#98c379" font-size="13" font-family="monospace">NOT NULL</text>
  <text x="332" y="160" fill="#98c379" font-size="13" font-family="monospace">DEFAULT 0.00</text>
  <text x="450" y="160" fill="#e2e8f0" font-size="13" font-family="monospace">,</text>

  <text x="110" y="184" fill="#f6c90e" font-size="13" font-family="monospace">email</text>
  <text x="190" y="184" fill="#56b6c2" font-size="13" font-family="monospace">TEXT</text>
  <text x="240" y="184" fill="#98c379" font-size="13" font-family="monospace">NOT NULL UNIQUE</text>
  <text x="370" y="184" fill="#e2e8f0" font-size="13" font-family="monospace">,</text>

  <text x="110" y="208" fill="#f6c90e" font-size="13" font-family="monospace">score</text>
  <text x="195" y="208" fill="#56b6c2" font-size="13" font-family="monospace">INTEGER</text>
  <text x="290" y="208" fill="#98c379" font-size="13" font-family="monospace">CHECK (score BETWEEN 0 AND 100)</text>

  <text x="86"  y="236" fill="#e2e8f0" font-size="14" font-family="monospace">);</text>

  <!-- Leyendas -->
  <rect x="60" y="274" width="600" height="120" rx="6" fill="#16213e" stroke="#2d3748" stroke-width="1"/>

  <rect x="80" y="290" width="12" height="12" fill="#c678dd"/>
  <text x="100" y="301" fill="#a0aec0" font-size="12">Palabras clave DDL</text>

  <rect x="80" y="314" width="12" height="12" fill="#e06c75"/>
  <text x="100" y="325" fill="#a0aec0" font-size="12">Nombre de tabla</text>

  <rect x="80" y="338" width="12" height="12" fill="#f6c90e"/>
  <text x="100" y="349" fill="#a0aec0" font-size="12">Nombres de columna</text>

  <rect x="280" y="290" width="12" height="12" fill="#56b6c2"/>
  <text x="300" y="301" fill="#a0aec0" font-size="12">Tipos de dato</text>

  <rect x="280" y="314" width="12" height="12" fill="#98c379"/>
  <text x="300" y="325" fill="#a0aec0" font-size="12">Constraints</text>

  <text x="360" y="366" text-anchor="middle" fill="#718096" font-size="11">IF NOT EXISTS → script idempotente (no falla si la tabla ya existe)</text>
</svg>
