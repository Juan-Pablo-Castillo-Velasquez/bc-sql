<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 310" width="720" height="310" font-family="Inter, Roboto, Open Sans, sans-serif">
  <rect width="720" height="310" fill="#1a1a2e"/>
  <text x="360" y="34" text-anchor="middle" fill="#a0aec0" font-size="13" font-weight="600">Filtros Combinados — Semana 05</text>

  <rect x="40" y="52" width="640" height="140" rx="6" fill="#16213e" stroke="#336791" stroke-width="1.5"/>
  <text x="360" y="72" text-anchor="middle" fill="#56b6c2" font-size="11" font-weight="700">Consulta con BETWEEN + IN + LIKE</text>
  <text x="58" y="96"  fill="#c678dd" font-size="13" font-weight="700" font-family="monospace">SELECT</text>
  <text x="58" y="114" fill="#f6c90e" font-size="13" font-family="monospace">    first_name, last_name, salary, department_id</text>
  <text x="58" y="132" fill="#c678dd" font-size="13" font-weight="700" font-family="monospace">FROM</text>
  <text x="110" y="132" fill="#e06c75" font-size="13" font-family="monospace">   employees</text>
  <text x="58" y="150" fill="#c678dd" font-size="13" font-weight="700" font-family="monospace">WHERE</text>
  <text x="116" y="150" fill="#f6c90e" font-size="13" font-family="monospace">  department_id</text>
  <text x="264" y="150" fill="#56b6c2" font-size="13" font-family="monospace" font-weight="700"> IN</text>
  <text x="290" y="150" fill="#e2e8f0" font-size="13" font-family="monospace"> (1, 2)</text>
  <text x="58" y="168" fill="#56b6c2" font-size="13" font-family="monospace" font-weight="700">  AND</text>
  <text x="102" y="168" fill="#f6c90e" font-size="13" font-family="monospace">  salary</text>
  <text x="178" y="168" fill="#56b6c2" font-size="13" font-family="monospace" font-weight="700"> BETWEEN</text>
  <text x="264" y="168" fill="#98c379" font-size="13" font-family="monospace"> 60000</text>
  <text x="340" y="168" fill="#56b6c2" font-size="13" font-family="monospace" font-weight="700"> AND</text>
  <text x="384" y="168" fill="#98c379" font-size="13" font-family="monospace"> 80000</text>
  <text x="58" y="186" fill="#56b6c2" font-size="13" font-family="monospace" font-weight="700">  AND</text>
  <text x="102" y="186" fill="#f6c90e" font-size="13" font-family="monospace">  last_name</text>
  <text x="202" y="186" fill="#56b6c2" font-size="13" font-family="monospace" font-weight="700"> LIKE</text>
  <text x="242" y="186" fill="#98c379" font-size="13" font-family="monospace"> 'S%';</text>

  <!-- Regla de precedencia -->
  <rect x="40" y="214" width="640" height="72" rx="6" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="360" y="236" text-anchor="middle" fill="#a0aec0" font-size="12" font-weight="600">Regla de precedencia lógica</text>
  <text x="60"  y="258" fill="#e2e8f0" font-size="11">NOT  &gt;  AND  &gt;  OR</text>
  <text x="200" y="258" fill="#718096" font-size="11"> — siempre usa paréntesis al mezclar AND y OR</text>
  <text x="60"  y="276" fill="#68d391" font-size="11">✓  (dept = 1 OR dept = 2) AND salary &gt; 60000</text>
  <text x="400" y="276" fill="#e06c75" font-size="11">✗  dept = 1 OR dept = 2 AND salary &gt; 60000</text>
</svg>
